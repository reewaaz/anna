name = "anna-proxy"
main = "worker.js"
compatibility_date = "2024-09-23"

# Deploy with:  wrangler deploy
# This creates the proxy at https://anna-proxy.riwaj-p.workers.dev/
# (a SEPARATE Worker from "anna", which serves the app at
#  https://anna.riwaj-p.workers.dev/, so the two never conflict).
#
# Usage: https://anna-proxy.riwaj-p.workers.dev/?url=<encoded-anna-url>
# This is the app's default proxy.
